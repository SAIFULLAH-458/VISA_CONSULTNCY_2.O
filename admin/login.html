<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Elite Visa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-dark: #001F2D;
            --primary-gold: #D4AF37;
            --accent-blue: #003d5c;
            --hover-gold: #e6c547;
            --white: #ffffff;
            --danger: #dc3545;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--accent-blue) 50%, #004d70 100%);
            position: relative; overflow: hidden;
        }
        /* Animated background */
        body::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(212,175,55,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(212,175,55,0.05) 0%, transparent 50%),
                        radial-gradient(circle at 50% 80%, rgba(0,61,92,0.15) 0%, transparent 50%);
            animation: bgMove 20s ease-in-out infinite alternate;
        }
        @keyframes bgMove { from { transform: translate(0,0); } to { transform: translate(-5%, 3%); } }

        .login-wrapper {
            position: relative; z-index: 1;
            width: 100%; max-width: 440px; padding: 1.5rem;
        }
        .login-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px; padding: 3rem 2.5rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        }
        .login-logo {
            text-align: center; margin-bottom: 2rem;
        }
        .login-logo .icon { font-size: 2.5rem; color: var(--primary-gold); margin-bottom: 0.5rem; }
        .login-logo h1 {
            font-family: 'Playfair Display', serif; font-size: 1.8rem;
            color: var(--white); letter-spacing: 2px;
        }
        .login-logo h1 span { color: var(--primary-gold); }
        .login-logo p { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 0.3rem; }

        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-group label {
            display: block; color: rgba(255,255,255,0.7); font-size: 0.85rem;
            font-weight: 500; margin-bottom: 0.5rem;
        }
        .input-wrapper {
            position: relative; display: flex; align-items: center;
        }
        .input-wrapper i {
            position: absolute; left: 1rem; color: rgba(255,255,255,0.35);
            font-size: 0.9rem; transition: color 0.3s;
        }
        .input-wrapper input {
            width: 100%; padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 12px; color: var(--white); font-size: 0.95rem;
            font-family: 'Inter', sans-serif; transition: all 0.3s;
            outline: none;
        }
        .input-wrapper input::placeholder { color: rgba(255,255,255,0.3); }
        .input-wrapper input:focus {
            border-color: var(--primary-gold);
            background: rgba(255,255,255,0.1);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.15);
        }
        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i { color: var(--primary-gold); }

        .toggle-pass {
            position: absolute; right: 1rem; background: none; border: none;
            color: rgba(255,255,255,0.35); cursor: pointer; font-size: 0.9rem;
            transition: color 0.3s;
        }
        .toggle-pass:hover { color: var(--primary-gold); }

        .error-msg {
            display: none; color: var(--danger); font-size: 0.82rem;
            margin-top: 0.5rem;
            background: rgba(220,53,69,0.1); padding: 0.5rem 0.8rem;
            border-radius: 8px; border: 1px solid rgba(220,53,69,0.2);
        }
        .error-msg.show { display: flex; align-items: center; gap: 0.4rem; }

        .remember-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem;
        }
        .remember-row label {
            display: flex; align-items: center; gap: 0.5rem;
            color: rgba(255,255,255,0.6); font-size: 0.85rem; cursor: pointer;
        }
        .remember-row input[type="checkbox"] {
            accent-color: var(--primary-gold); width: 16px; height: 16px;
        }

        .login-btn {
            width: 100%; padding: 1rem;
            background: linear-gradient(135deg, var(--primary-gold), var(--hover-gold));
            color: var(--primary-dark); border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.4);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
        .login-btn .spinner {
            display: none; width: 18px; height: 18px;
            border: 2px solid rgba(0,31,45,0.3); border-top-color: var(--primary-dark);
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        .login-btn.loading .spinner { display: inline-block; }
        .login-btn.loading span { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .back-link {
            display: block; text-align: center; margin-top: 1.5rem;
            color: rgba(255,255,255,0.4); font-size: 0.85rem; text-decoration: none;
            transition: color 0.3s;
        }
        .back-link:hover { color: var(--primary-gold); }

        .hint {
            text-align: center; margin-top: 1.2rem;
            padding: 0.8rem; border-radius: 10px;
            background: rgba(212,175,55,0.08); border: 1px solid rgba(212,175,55,0.15);
        }
        .hint p { color: rgba(255,255,255,0.5); font-size: 0.78rem; }
        .hint code {
            color: var(--primary-gold); background: rgba(212,175,55,0.15);
            padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-logo">
                <div class="icon">✦</div>
                <h1>ELITE <span>VISA</span></h1>
                <p>Admin Control Panel</p>
            </div>

            <form id="adminLoginForm" autocomplete="off">
                <div class="form-group">
                    <label>Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="adminUser" placeholder="Enter username" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="adminPass" placeholder="Enter password" required>
                        <i class="fas fa-lock"></i>
                        <button type="button" class="toggle-pass" onclick="togglePassword()">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="loginError" class="error-msg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>Invalid username or password</span>
                </div>

                <div class="remember-row">
                    <label><input type="checkbox" id="rememberMe"> Remember me</label>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <div class="spinner"></div>
                    <span><i class="fas fa-sign-in-alt"></i> Sign In</span>
                </button>
            </form>

            <div class="hint">
                <p>Demo: <code>admin</code> / <code>admin123</code></p>
            </div>

            <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Website</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const inp = document.getElementById('adminPass');
            const icon = document.querySelector('.toggle-pass i');
            if (inp.type === 'password') {
                inp.type = 'text'; icon.className = 'fas fa-eye-slash';
            } else {
                inp.type = 'password'; icon.className = 'fas fa-eye';
            }
        }

        // Check if already logged in
        if (localStorage.getItem('ev_admin_logged') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value;
            const errorEl = document.getElementById('loginError');
            const btn = document.getElementById('loginBtn');

            errorEl.classList.remove('show');
            btn.classList.add('loading');
            btn.disabled = true;

            setTimeout(() => {
                if (user === 'admin' && pass === 'admin123') {
                    localStorage.setItem('ev_admin_logged', 'true');
                    localStorage.setItem('ev_admin_user', user);
                    window.location.href = 'dashboard.html';
                } else {
                    errorEl.classList.add('show');
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }
            }, 1200);
        });
    </script>
</body>
</html>
